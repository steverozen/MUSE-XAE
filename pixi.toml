[workspace]
authors = ["Steven G. Rozen <steverozen@pm.me>"]
channels = ["conda-forge"]
name = "MUSE-XAE"
platforms = ["linux-64"]
version = "0.1.0"

[activation]
# Prepend pixi env lib so conda-forge's libstdc++ (CXXABI_1.3.15) takes priority
# over the system's older version on DCC.
env = { LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH" }

[tasks]

[dependencies]
python = "3.10.*"
libstdcxx-ng = ">=13"
pip = ">=26.0.1,<27"
lap = ">=0.5.13,<0.6"
pandas = ">=1.5,<3"
numpy = ">=1.24,<2"
scipy = ">=1.10,<2"
scikit-learn = ">=1.2,<2"
optuna = ">=3.1,<4"
matplotlib = ">=3.7,<4"
seaborn = ">=0.12,<1"
pypdf2 = ">=3,<4"

[pypi-dependencies]
tensorflow-cpu = "==2.11.0"
